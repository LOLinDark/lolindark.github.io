<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirecting...</title>
  <script>
    (function () {
      var path = window.location.pathname || '/';
      if (path === '/hotas-config' || path === '/hotas-config/' || path === '/hotas-config.html') {
        window.location.replace('/hotas-config/');
        return;
      }
      window.location.replace('/');
    })();
  </script>
</head>
<body></body>
</html>
